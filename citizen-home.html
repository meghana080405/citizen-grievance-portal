<!DOCTYPE html>
<html>
<head>
<title>Citizen Dashboard</title>

<link rel="stylesheet" href="style.css">
<script src="script.js"></script>

</head>

<body onload="loadProfile(); loadDashboardStats(); loadRecentComplaints();">

<!-- ================= NAVBAR ================= -->

<div class="navbar">

    <!-- Logo -->
    <div class="logo">
        🛡 CitizenVoice
    </div>

    <!-- Navigation Links -->
    <div class="nav-links">
        <a href="citizen-home.html">Home</a>
        <a href="complaint.html">Submit Complaint</a>
        <a href="complaints.html">My Complaints</a>
    </div>


    <!-- Profile Section -->
    <div class="profile-container">

        <!-- Profile Button -->
        <div class="profile-btn" onclick="toggleProfile()">

            <div class="avatar" id="avatarLetter">U</div>

            <span id="profileName"></span>

            <span class="arrow">▼</span>

        </div>


        <!-- Profile Dropdown -->
        <div class="profile-dropdown" id="profileDropdown">

            <div class="profile-info">

                <div class="avatar large" id="avatarLarge">U</div>

                <div>
                    <h4 id="profileNameCard"></h4>
                    <p id="profileEmail"></p>
                    <span class="role">USER</span>
                </div>

            </div>

            <hr>

            <button class="logout-btn" onclick="logoutUser()">
                Sign Out
            </button>

        </div>

    </div>

</div>


<!-- ================= PAGE CONTENT ================= -->

<div class="container">

    <!-- Welcome Text -->
    <h2 id="welcomeText">Welcome back</h2>

    <p class="subtitle">
        Here's an overview of civic grievances in your area.
    </p>


    <!-- New Complaint Button -->
    <button class="new-btn" onclick="openComplaint()">
        + New Complaint
    </button>


    <!-- ================= DASHBOARD STATS ================= -->

    <div class="stats">

        <div class="stat-card">
            <h3 id="totalComplaints">0</h3>
            <p>Total Complaints</p>
        </div>

        <div class="stat-card green">
            <h3 id="resolvedComplaints">0</h3>
            <p>Resolved</p>
        </div>

        <div class="stat-card orange">
            <h3 id="progressComplaints">0</h3>
            <p>In Progress</p>
        </div>

        <div class="stat-card purple">
            <h3 id="pendingComplaints">0</h3>
            <p>Pending</p>
        </div>

    </div>


    <!-- ================= RECENT COMPLAINTS ================= -->

    <h3>Recent Complaints</h3>

    <div id="recentComplaintsContainer"></div>

    <a href="complaints.html" class="view-all">
        View All Complaints →
    </a>

</div>

</body>
</html>
